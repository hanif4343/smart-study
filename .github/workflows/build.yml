name: Build Smart Study APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ── Node.js (JS bundling) ──────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install JS build tools
        run: npm install

      # ── Java / Android ─────────────────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.4'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android licenses
        run: yes | sdkmanager --licenses || true

      - name: Install Android build tools
        run: sdkmanager "build-tools;34.0.0" "platforms;android-34" "platform-tools"

      # ── Secrets ────────────────────────────────────────────
      - name: Create google-services.json
        run: echo '${{ secrets.GOOGLE_SERVICES_JSON }}' > app/google-services.json

      - name: Decode Keystore
        run: echo '${{ secrets.KEYSTORE_BASE64 }}' | base64 -d > app/smartstudy.jks

      # ── Version ────────────────────────────────────────────
      - name: Auto increment versionCode
        run: |
          RUN=${{ github.run_number }}
          sed -i "s/versionCode [0-9]*/versionCode $RUN/" app/build.gradle
          echo "versionCode → $RUN"

      # ── Inject API keys BEFORE bundling ────────────────────
      - name: Inject API keys into JS files
        run: |
          JS="app/src/main/assets/js"
          # config.js
          sed -i "s|%%FIREBASE_URL%%|${{ secrets.FIREBASE_URL }}|g"     "$JS/config.js"
          sed -i "s|%%SECRET_KEY%%|${{ secrets.SECRET_KEY }}|g"         "$JS/config.js"
          sed -i "s|%%GAS_URL%%|${{ secrets.GAS_URL }}|g"               "$JS/config.js"
          sed -i "s|%%ADMIN_PHONE%%|${{ secrets.ADMIN_PHONE }}|g"       "$JS/config.js"
          # written.js (Gemini AI answer check)
          sed -i "s|%%GEMINI_API_KEY%%|${{ secrets.GEMINI_API_KEY }}|g" "$JS/written.js"
          echo "Keys injected ✅"

      - name: Verify keys injected
        run: |
          JS="app/src/main/assets/js"
          FAIL=0
          for f in "$JS/config.js" "$JS/written.js"; do
            if grep -q "%%" "$f"; then
              echo "ERROR: Placeholders not replaced in $f"
              grep "%%" "$f"
              FAIL=1
            fi
          done
          [ $FAIL -eq 0 ] && echo "All keys OK ✅" || exit 1

      # ── Bundle + Minify + Obfuscate ────────────────────────
      - name: Bundle, Minify & Obfuscate JS
        run: |
          chmod +x scripts/build.sh
          bash scripts/build.sh

      - name: Verify obfuscated bundle
        run: |
          BUNDLE="app/src/main/assets/js/bundle.obf.js"
          if [ ! -f "$BUNDLE" ]; then
            echo "ERROR: $BUNDLE not found!"
            exit 1
          fi
          SIZE=$(wc -c < "$BUNDLE")
          echo "bundle.obf.js → $SIZE bytes ✅"
          # Make sure source JS files are gone
          if ls app/src/main/assets/js/*.js 2>/dev/null | grep -v bundle.obf.js; then
            echo "WARNING: Source JS files still present"
          fi

      # ── Gradle Build ───────────────────────────────────────
      - name: Build Debug APK
        run: gradle assembleDebug

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: SmartStudy-Debug-b${{ github.run_number }}
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error

      - name: Build Signed Release APK
        run: |
          gradle assembleRelease \
            -Pandroid.injected.signing.store.file=${{ github.workspace }}/app/smartstudy.jks \
            -Pandroid.injected.signing.store.password=${{ secrets.STORE_PASSWORD }} \
            -Pandroid.injected.signing.key.alias=smartstudy \
            -Pandroid.injected.signing.key.password=${{ secrets.KEY_PASSWORD }}

      - name: Rename APK
        run: mv app/build/outputs/apk/release/app-release.apk \
                app/build/outputs/apk/release/SmartStudy.apk

      - name: Upload Signed Release APK
        uses: actions/upload-artifact@v4
        with:
          name: SmartStudy-Release-SIGNED-b${{ github.run_number }}
          path: app/build/outputs/apk/release/SmartStudy.apk
          if-no-files-found: error

      # ── GitHub Release ─────────────────────────────────────
      - name: Get version info
        id: version
        run: |
          VERSION=$(grep "versionName" app/build.gradle \
            | sed 's/.*"\(.*\)".*/\1/' | tr -d '[:space:]')
          BUILD=${{ github.run_number }}
          echo "version=$VERSION"   >> $GITHUB_OUTPUT
          echo "build=$BUILD"       >> $GITHUB_OUTPUT
          echo "tag=v${VERSION}-b${BUILD}" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "Smart Study v${{ steps.version.outputs.version }} (Build ${{ steps.version.outputs.build }})"
          body: |
            ## 📚 Smart Study v${{ steps.version.outputs.version }}

            ### ডাউনলোড
            নিচের **SmartStudy.apk** তে ক্লিক করো।

            ### ইনস্টল
            1. APK download করো
            2. **Unknown sources** চালু করো
            3. Install করো

            ---
            🔨 Build #${{ steps.version.outputs.build }}
            📅 ${{ github.event.head_commit.timestamp }}
            💬 ${{ github.event.head_commit.message }}
          files: app/build/outputs/apk/release/SmartStudy.apk
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
