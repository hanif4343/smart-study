name: Build Smart-Study APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.4'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android licenses
        run: yes | sdkmanager --licenses || true

      - name: Install build tools
        run: sdkmanager "build-tools;34.0.0" "platforms;android-34" "platform-tools"

      - name: Create google-services.json from secret
        run: echo '${{ secrets.GOOGLE_SERVICES_JSON }}' > app/google-services.json

      - name: Decode Keystore from secret
        run: echo '${{ secrets.KEYSTORE_BASE64 }}' | base64 -d > app/smartstudy.jks

      # ── Auto increment versionCode using GitHub run number ──
      - name: Auto increment versionCode
        run: |
          RUN=${{ github.run_number }}
          sed -i "s/versionCode [0-9]*/versionCode $RUN/" app/build.gradle
          echo "versionCode set to: $RUN"

      - name: Inject API keys into index.html
        run: |
          sed -i "s|%%FIREBASE_URL%%|${{ secrets.FIREBASE_URL }}|g" app/src/main/assets/index.html
          sed -i "s|%%SECRET_KEY%%|${{ secrets.SECRET_KEY }}|g" app/src/main/assets/index.html
          sed -i "s|%%GAS_URL%%|${{ secrets.GAS_URL }}|g" app/src/main/assets/index.html
          sed -i "s|%%GEMINI_API_KEY%%|${{ secrets.GEMINI_API_KEY }}|g" app/src/main/assets/index.html
          echo "API keys injected successfully"

      - name: Verify keys injected
        run: |
          if grep -q "%%" app/src/main/assets/index.html; then
            echo "ERROR: Some placeholders not replaced!"
            exit 1
          else
            echo "All keys injected OK"
          fi

      - name: Build Debug APK
        run: gradle assembleDebug

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: Smart-Study-Debug-APK
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error

      - name: Build Signed Release APK
        run: |
          gradle assembleRelease \
            -Pandroid.injected.signing.store.file=${{ github.workspace }}/app/smartstudy.jks \
            -Pandroid.injected.signing.store.password=${{ secrets.STORE_PASSWORD }} \
            -Pandroid.injected.signing.key.alias=smartstudy \
            -Pandroid.injected.signing.key.password=${{ secrets.KEY_PASSWORD }}

      - name: Upload Signed Release APK
        uses: actions/upload-artifact@v4
        with:
          name: Smart-Study-Release-SIGNED
          path: app/build/outputs/apk/release/app-release.apk
          if-no-files-found: error

      # ── Auto GitHub Release ──────────────────────────────
      - name: Get version info
        id: version
        run: |
          VERSION=$(grep "versionName" app/build.gradle | sed 's/.*"\(.*\)".*/\1/' | tr -d '[:space:]')
          BUILD=${{ github.run_number }}
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "build=$BUILD" >> $GITHUB_OUTPUT
          echo "tag=v${VERSION}-build${BUILD}" >> $GITHUB_OUTPUT

      - name: Create GitHub Release with APK
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "Smart Study BD v${{ steps.version.outputs.version }} (Build ${{ steps.version.outputs.build }})"
          body: |
            ## 📚 Smart Study BD v${{ steps.version.outputs.version }}

            ### ডাউনলোড করো
            নিচের **app-release.apk** ফাইলে ক্লিক করো।

            ### ইনস্টল করার নিয়ম
            1. APK download করো
            2. ফোনে **Unknown sources** চালু করো
            3. APK install করো

            ---
            🔨 Build: #${{ steps.version.outputs.build }}
            📅 ${{ github.event.head_commit.timestamp }}
            💬 ${{ github.event.head_commit.message }}
          files: app/build/outputs/apk/release/app-release.apk
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
