name: Build Smart-Study APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.4'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android licenses
        run: yes | sdkmanager --licenses || true

      - name: Install build tools
        run: sdkmanager "build-tools;34.0.0" "platforms;android-34" "platform-tools"

      - name: Inject API keys into index.html
        run: |
          sed -i "s|%%FIREBASE_URL%%|${{ secrets.FIREBASE_URL }}|g" app/src/main/assets/index.html
          sed -i "s|%%SECRET_KEY%%|${{ secrets.SECRET_KEY }}|g" app/src/main/assets/index.html
          sed -i "s|%%GAS_URL%%|${{ secrets.GAS_URL }}|g" app/src/main/assets/index.html
          sed -i "s|%%GEMINI_API_KEY%%|${{ secrets.GEMINI_API_KEY }}|g" app/src/main/assets/index.html
          echo "API keys injected successfully"

      - name: Verify keys injected
        run: |
          if grep -q "%%" app/src/main/assets/index.html; then
            echo "ERROR: Some placeholders not replaced!"
            exit 1
          else
            echo "All keys injected OK"
          fi

      - name: Build Debug APK
        run: gradle assembleDebug

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: Smart-Study-APK
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error

      - name: Build Release APK
        run: gradle assembleRelease

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: Smart-Study-Release-APK
          path: app/build/outputs/apk/release/app-release-unsigned.apk
          if-no-files-found: warn
