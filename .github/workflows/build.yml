name: Build Smart Study APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ── Node.js ────────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          # cache: npm  ← বন্ধ রাখো, package-lock দরকার হয়

      - name: Install JS build tools
        run: npm install --no-audit --no-fund

      # ── Java ───────────────────────────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      # ── Gradle wrapper jar (repo তে নেই, download করো) ────
      - name: Download Gradle wrapper jar
        run: |
          mkdir -p gradle/wrapper
          curl -sL "https://github.com/gradle/gradle/raw/v8.4.0/gradle/wrapper/gradle-wrapper.jar"             -o gradle/wrapper/gradle-wrapper.jar             || wget -q "https://github.com/gradle/gradle/raw/v8.4.0/gradle/wrapper/gradle-wrapper.jar"             -O gradle/wrapper/gradle-wrapper.jar
          echo "Wrapper jar: $(wc -c < gradle/wrapper/gradle-wrapper.jar) bytes"

      # ── Android SDK ────────────────────────────────────────
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept licenses & install SDK
        run: |
          yes | sdkmanager --licenses 2>/dev/null || true
          sdkmanager "build-tools;34.0.0" "platforms;android-34"

      # ── Secrets ────────────────────────────────────────────
      - name: Create google-services.json
        run: echo '${{ secrets.GOOGLE_SERVICES_JSON }}' > app/google-services.json

      - name: Decode Keystore
        run: |
          echo '${{ secrets.KEYSTORE_BASE64 }}' | base64 --decode > app/smartstudy.jks
          echo "Keystore size: $(wc -c < app/smartstudy.jks) bytes"

      # ── Version ────────────────────────────────────────────
      - name: Set versionCode
        run: |
          sed -i "s/versionCode [0-9]*/versionCode ${{ github.run_number }}/" app/build.gradle
          echo "versionCode → ${{ github.run_number }}"

      # ── Inject secrets BEFORE bundling ─────────────────────
      - name: Inject API keys
        run: |
          JS="app/src/main/assets/js"
          sed -i "s|%%FIREBASE_URL%%|${{ secrets.FIREBASE_URL }}|g"     "$JS/config.js"
          sed -i "s|%%SECRET_KEY%%|${{ secrets.SECRET_KEY }}|g"         "$JS/config.js"
          sed -i "s|%%GAS_URL%%|${{ secrets.GAS_URL }}|g"               "$JS/config.js"
          sed -i "s|%%ADMIN_PHONE%%|${{ secrets.ADMIN_PHONE }}|g"       "$JS/config.js"
          sed -i "s|%%GEMINI_API_KEY%%|${{ secrets.GEMINI_API_KEY }}|g" "$JS/written.js"
          echo "Keys injected ✅"

      - name: Verify keys injected
        run: |
          JS="app/src/main/assets/js"
          FAIL=0
          for f in "$JS/config.js" "$JS/written.js"; do
            if grep -q "%%" "$f"; then
              echo "ERROR: unreplaced placeholders in $f"
              grep "%%" "$f"
              FAIL=1
            fi
          done
          [ $FAIL -eq 0 ] && echo "All keys OK ✅" || exit 1

      # ── Bundle + Minify + Obfuscate ────────────────────────
      - name: Bundle, Minify & Obfuscate JS
        run: bash scripts/build.sh

      - name: Verify bundle
        run: |
          BUNDLE="app/src/main/assets/js/bundle.obf.js"
          [ -f "$BUNDLE" ] || { echo "ERROR: bundle not found!"; exit 1; }
          echo "bundle.obf.js → $(wc -c < $BUNDLE) bytes ✅"

      # ── Gradle permission ──────────────────────────────────
      - name: Make gradlew executable
        run: chmod +x gradlew

      # ── Debug APK ──────────────────────────────────────────
      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: SmartStudy-Debug-b${{ github.run_number }}
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error

      # ── Release APK ────────────────────────────────────────
      - name: Build Signed Release APK
        run: |
          ./gradlew assembleRelease --no-daemon --stacktrace \
            -Pandroid.injected.signing.store.file=${{ github.workspace }}/app/smartstudy.jks \
            -Pandroid.injected.signing.store.password=${{ secrets.STORE_PASSWORD }} \
            -Pandroid.injected.signing.key.alias=smartstudy \
            -Pandroid.injected.signing.key.password=${{ secrets.KEY_PASSWORD }}

      - name: Rename APK
        run: |
          mv app/build/outputs/apk/release/app-release.apk \
             app/build/outputs/apk/release/SmartStudy.apk

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: SmartStudy-Release-b${{ github.run_number }}
          path: app/build/outputs/apk/release/SmartStudy.apk
          if-no-files-found: error

      # ── GitHub Release ─────────────────────────────────────
      - name: Get version name
        id: ver
        run: |
          VER=$(grep versionName app/build.gradle | sed 's/.*"\(.*\)".*/\1/' | tr -d ' ')
          echo "name=$VER" >> $GITHUB_OUTPUT
          echo "tag=v${VER}-b${{ github.run_number }}" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: "Smart Study v${{ steps.ver.outputs.name }} (Build ${{ github.run_number }})"
          body: |
            ## 📚 Smart Study v${{ steps.ver.outputs.name }}

            নিচের **SmartStudy.apk** ডাউনলোড করো।

            **ইনস্টল:** APK ডাউনলোড → Unknown sources চালু → Install

            ---
            🔨 Build #${{ github.run_number }} | 💬 ${{ github.event.head_commit.message }}
          files: app/build/outputs/apk/release/SmartStudy.apk
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
